name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        
      - name: Run Vitest
        run: npm run test
        
      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
          
      - name: Run Deno tests
        run: deno test -A supabase/functions/
